<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclando Tabelas</title>
</head>
<body>

    <h2>Tabela 1</h2>
    <table border="1">

        <tr>
            <th>Categoria</th>
            <th>Produto</th>
            <th>Quantidade</th>
        </tr>

        <tr>
            <td rowspan="2">Informatica</td>
            <td>Notebook</td>
            <td>12</td>
        </tr>

        <tr>
            <td>Mouse</td>
            <td>30</td>
        </tr>

        <tr>
            <td rowspan="2">Alimentos</td>
            <td>Arroz</td>
            <td>100</td>
        </tr>

        <tr>
            <td>Feijão</td>
            <td>80</td>
        </tr>

        <tr>
            <td rowspan="2">Limpeza</td>
            <td>Detergente</td>
            <td>45</td>
        </tr>

        <tr>
            <td>Sabão em pó</td>
            <td>60</td>
        </tr>

    </table>

    <hr>

    <h2>Tabela 2</h2>
    <table border="1">
        
        <tr>
            <th colspan="3">Lista de Produtos</th>
        </tr>

        <tr>
            <th>Categoria</th>
            <th>Nome</th>
            <th>Quantidade</th>
        </tr>

        <tr>
            <td rowspan="2">Informática</td>
            <td>Notebook</td>
            <td>10</td>
        </tr>

        <tr>
            <td>Mouse</td>
            <td>25</td>
        </tr>

        <tr>
            <td>Alimentos</td>
            <td>Banana</td>
            <td>50</td>
        </tr>

    </table>
</body>
</html>
